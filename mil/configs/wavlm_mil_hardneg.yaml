variant_name: "wavlm_mil_hardneg"
backbone: "microsoft/wavlm-base-plus"
backbone_layer: -1
window_sec: 2.0
stride_sec: 1.0
mil_hidden_dim: 256
mil_dropout: 0.25
lr: 1.0e-3
epochs: 20
patience: 5
batch_size: 8
pos_weight: null
seed: 42
split_dir: "whisper-modeling/seen_child_splits"
device: "cuda"
# Hard negatives from Playlogue + Providence (30s windows, CHI-silent, non-silence active)
# Generate with: python mil/scripts/extract_hard_negatives.py
extra_negatives_csv: "synth_results/manifests/hard_negatives_manifest.csv"
# Cap at original neg count (344) so pos:neg ≈ 967:688 ≈ 1.4:1; set higher to go closer to 1:1
extra_negatives_cap: 623  # 967 - 344 = 623 more negatives → total 967 neg = 1:1
