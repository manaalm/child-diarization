encoder: "microsoft/wavlm-base-plus"
encoder_layer: -1
split_dir: "whisper-modeling/seen_child_splits"
output_dir: "mil/mil_results/seg_mil"
embedding_cache_dir: "mil/seg_embedding_cache"
seed: 42
min_seg_dur_sec: 0.4

# Training hyperparameters
lr: 1.0e-3
epochs: 20
patience: 5
batch_size: 32

# Attention head hidden dim (for AttnAgg / GatedAttnAgg)
attn_dim: 256

frontends:
  - name: "usc_sail"
    rttm_cache_dir: "whisper-modeling/usc_sail_rttm_cache"
  - name: "pyannote"
    rttm_cache_dir: "pyannote/pyannote_rttm_cache"
  - name: "babar_vtc"
    rttm_cache_dir: "pyannote/vtc_rttm_cache"
  - name: "vbx"
    rttm_cache_dir: "pyannote/vbx_rttm_cache"

aggregators:
  - "mean"
  - "max"
  - "attention"
  - "gated_attention"
  - "noisy_or"
  - "top_k"
  - "transformer"
  # spec-014 US5 (DSMIL) and US6 (adaptive pooling)
  - "dsmil"
  - "auto_pool"
  - "exp_softmax_pool"
  - "gmap"

# Top-k aggregator: number of top-scoring instances to pool
top_k: 3

# Transformer aggregator hyperparameters
transformer_config:
  num_layers: 2
  num_heads: 4
  ffn_dim: 1536
  dropout: 0.3
  weight_decay: 0.01
  k_max: 128
