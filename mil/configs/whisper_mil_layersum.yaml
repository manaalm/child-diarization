variant_name: "whisper_mil_layersum"
backbone: "openai/whisper-small"
backbone_layer: -1
window_sec: 2.0
stride_sec: 1.0
mil_hidden_dim: 256
mil_dropout: 0.25
lr: 1.0e-3
epochs: 20
patience: 5
batch_size: 8
pos_weight: null
seed: 42
split_dir: "whisper-modeling/seen_child_splits"
device: "cuda"

# spec-014 US1: learnable softmax over Whisper encoder layers
layer_aggregation: "weighted_sum"
layer_aggregation_skip_first: false
