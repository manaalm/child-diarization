# Thesis table definitions
#
# Each table entry defines:
#   name:        Short identifier used as the output CSV filename
#   title:       Human-readable table title
#   columns:     Ordered list of column names to include in the output CSV
#   rows:        List of row definitions (label + source file + key mappings)
#
# Source files are relative to the repository root.
# "key_map" maps output column names to JSON keys inside the source file.
# For CSV sources, "csv_filter" may specify a column=value filter to select rows.
#
# required_files: flat list of all result files that must exist before assembly.
# The aggregate script exits 1 with a missing-file report if any are absent.

# ---------------------------------------------------------------------------
# Table 1: Encoder Baseline Results (cross-child split)
# ---------------------------------------------------------------------------
- name: table1_encoder_baselines
  title: "Encoder baseline models — cross-child held-out test set"
  columns: [model, pooling, f1, precision, recall, auroc, auprc]
  rows:
    - label: "Whisper-Base / mean"
      source: baselines/baseline_results/whisper_mean/test_metrics_tuned.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc}
      meta: {model: "Whisper-Base", pooling: "mean"}
    - label: "Whisper-Base / attn"
      source: baselines/baseline_results/whisper_attn/test_metrics_tuned.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc}
      meta: {model: "Whisper-Base", pooling: "attn"}
    - label: "WavLM-Base / mean"
      source: baselines/baseline_results/wavlm_mean/test_metrics_tuned.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc}
      meta: {model: "WavLM-Base", pooling: "mean"}
    - label: "WavLM-Base / attn"
      source: baselines/baseline_results/wavlm_attn/test_metrics_tuned.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc}
      meta: {model: "WavLM-Base", pooling: "attn"}

# ---------------------------------------------------------------------------
# Table 2: Diarizer Enrollment Results (seen-child split)
# ---------------------------------------------------------------------------
- name: table2_enrollment_baselines
  title: "Diarizer enrollment — seen-child held-out test set"
  columns: [diarizer, f1, precision, recall, auroc, auprc, threshold]
  rows:
    - label: "USC-SAIL"
      source: whisper-modeling/usc_sail_enrollment_runs/enroll_test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc, threshold: threshold}
      meta: {diarizer: "USC-SAIL"}
    - label: "Pyannote"
      source: pyannote/pyannote_enrollment_runs/test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc, threshold: threshold}
      meta: {diarizer: "Pyannote"}
    - label: "BabAR"
      source: babar_ecapa_enrollment_runs/enroll_test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc, threshold: threshold}
      meta: {diarizer: "BabAR"}
    - label: "VTC (KCHI+OCH)"
      source: vtc_ecapa_enrollment_runs/enroll_test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc, threshold: threshold}
      meta: {diarizer: "VTC (KCHI+OCH)"}
    - label: "VTC (KCHI only)"
      source: vtc_kchi_ecapa_enrollment_runs/enroll_test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc, threshold: threshold}
      meta: {diarizer: "VTC (KCHI only)"}
    - label: "VBx"
      source: vbx_ecapa_enrollment_runs/enroll_test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc, threshold: threshold}
      meta: {diarizer: "VBx"}

