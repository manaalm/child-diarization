# ---------------------------------------------------------------------------
# required_files: all files that must exist for a complete table assembly
# Files listed here that are missing cause the script to exit 1
# ---------------------------------------------------------------------------
- required_files:
    # Table 1 — encoder baselines (all should already exist)
    - baselines/baseline_results/whisper_mean/test_metrics_tuned.json
    - baselines/baseline_results/whisper_attn/test_metrics_tuned.json
    - baselines/baseline_results/wavlm_mean/test_metrics_tuned.json
    - baselines/baseline_results/wavlm_attn/test_metrics_tuned.json
    # Table 2 — enrollment baselines (all should already exist)
    - whisper-modeling/usc_sail_enrollment_runs/enroll_test_metrics.json
    - pyannote/pyannote_enrollment_runs/test_metrics.json
    - babar_ecapa_enrollment_runs/enroll_test_metrics.json
    - vtc_ecapa_enrollment_runs/enroll_test_metrics.json
    - vtc_kchi_ecapa_enrollment_runs/enroll_test_metrics.json
    - vbx_ecapa_enrollment_runs/enroll_test_metrics.json
    # Table 3-6 — age-stratified (by_timepoint CSVs produced by unified.py enrollment runs)
    - babar_ecapa_enrollment_runs/enroll_test_metrics_by_timepoint.csv
    - whisper-modeling/usc_sail_enrollment_runs/enroll_test_metrics_by_timepoint.csv
    - pyannote/pyannote_enrollment_runs/test_metrics_by_timepoint.csv
    - vtc_ecapa_enrollment_runs/enroll_test_metrics_by_timepoint.csv
    - vbx_ecapa_enrollment_runs/enroll_test_metrics_by_timepoint.csv
    # Table 7 — synthesis eval (produced by synthesis/evaluate.py)
    - synthesis/eval_results/12_16m/eval_results.json
    - synthesis/eval_results/34_38m/eval_results.json
    # Table 8 — augmentation eval (produced by augmentation_eval.py)
    - pyannote/babar_augmented/12_16m_ratio1.0/test_metrics_tuned.json
    - pyannote/babar_augmented/34_38m_ratio1.0/test_metrics_tuned.json
    # Table 9 — segment-instance MIL (produced by mil/seg_train.py sweep)
    - mil/mil_results/seg_mil/all_configs.json
    # Table 9b — frame-window MIL (produced by mil/mil_evaluate.py)
    - mil/mil_results/wavlm_mil/test_metrics_tuned.json
    - mil/mil_results/whisper_mil/test_metrics_tuned.json
    - mil/mil_results/wavlm_mil/test_metrics_by_timepoint.csv
    - mil/mil_results/whisper_mil/test_metrics_by_timepoint.csv
    # Table 10 — AV fusion (produced by av_fusion/scripts/evaluate_av_fusion.py)
    - av_fusion/av_results/manual_only/metrics_overall.json

# ---------------------------------------------------------------------------
# Table 9: Segment-Instance MIL — 16-cell frontend × aggregator matrix
# ---------------------------------------------------------------------------
- name: table_segment_mil
  title: "Segment-instance MIL — 4 frontends × 4 aggregators (seen-child test set)"
  columns: [diarizer, aggregator, f1, precision, recall, auroc, auprc]
  source: mil/mil_results/seg_mil/all_configs.json
  source_type: json_array
  key_map:
    diarizer: frontend
    aggregator: aggregator
    f1: test_f1
    precision: test_precision
    recall: test_recall
    auroc: test_auroc
    auprc: test_auprc
