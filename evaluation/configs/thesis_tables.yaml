  columns: [age_group, condition, f1, precision, recall, auroc, auprc]
  rows:
    - label: "12-16m baseline"
      source: babar_ecapa_enrollment_runs/enroll_test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc}
      meta: {age_group: "12_16m", condition: "no augmentation"}
    - label: "12-16m augmented"
      source: pyannote/babar_augmented/12_16m_ratio1.0/test_metrics_tuned.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc}
      meta: {age_group: "12_16m", condition: "aug ratio=1.0"}
    - label: "34-38m baseline"
      source: babar_ecapa_enrollment_runs/enroll_test_metrics.json
      key_map: {f1: f1, precision: precision, recall: recall, auroc: auroc, auprc: auprc}
      meta: {age_group: "34_38m", condition: "no augmentation"}
