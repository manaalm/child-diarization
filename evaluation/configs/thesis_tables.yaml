      meta: {age_group: "34_38m", condition: "aug ratio=1.0"}

# ---------------------------------------------------------------------------
# required_files: all files that must exist for a complete table assembly
# Files listed here that are missing cause the script to exit 1
# ---------------------------------------------------------------------------
- required_files:
    # Table 1 — encoder baselines (all should already exist)
    - baselines/baseline_results/whisper_mean/test_metrics_tuned.json
    - baselines/baseline_results/whisper_attn/test_metrics_tuned.json
    - baselines/baseline_results/wavlm_mean/test_metrics_tuned.json
    - baselines/baseline_results/wavlm_attn/test_metrics_tuned.json
    # Table 2 — enrollment baselines (all should already exist)
    - whisper-modeling/usc_sail_enrollment_runs/enroll_test_metrics.json
    - pyannote/pyannote_enrollment_runs/test_metrics.json
    - babar_ecapa_enrollment_runs/enroll_test_metrics.json
    - vtc_ecapa_enrollment_runs/enroll_test_metrics.json
    - vtc_kchi_ecapa_enrollment_runs/enroll_test_metrics.json
    - vbx_ecapa_enrollment_runs/enroll_test_metrics.json
    # Table 3-6 — age-stratified (produced by unified_age_stratified.py runs)
    - pyannote/babar_age_stratified/12_16m/test_metrics_tuned.json
    - pyannote/babar_age_stratified/34_38m/test_metrics_tuned.json
    - pyannote/usc_sail_age_stratified/12_16m/test_metrics_tuned.json
    - pyannote/usc_sail_age_stratified/34_38m/test_metrics_tuned.json
    - pyannote/pyannote_age_stratified/12_16m/test_metrics_tuned.json
    - pyannote/pyannote_age_stratified/34_38m/test_metrics_tuned.json
    - pyannote/vtc_age_stratified/12_16m/test_metrics_tuned.json
    - pyannote/vtc_age_stratified/34_38m/test_metrics_tuned.json
    - pyannote/vbx_age_stratified/12_16m/test_metrics_tuned.json
    - pyannote/vbx_age_stratified/34_38m/test_metrics_tuned.json
    # Table 7 — synthesis eval (produced by synthesis/evaluate.py)
    - synthesis/eval_results/12_16m/eval_results.json
    - synthesis/eval_results/34_38m/eval_results.json
    # Table 8 — augmentation eval (produced by augmentation_eval.py)
    - pyannote/babar_augmented/12_16m_ratio1.0/test_metrics_tuned.json
    - pyannote/babar_augmented/34_38m_ratio1.0/test_metrics_tuned.json
