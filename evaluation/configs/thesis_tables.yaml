# ---------------------------------------------------------------------------
# Table 7: Synthesis Evaluation
# ---------------------------------------------------------------------------
- name: table7_synthesis_eval
  title: "Synthesis quality evaluation"
  columns: [age_group, model, mcd_mean, mcd_std, speaker_similarity_mean, age_classifier_accuracy, f0_mean, f0_std]
  rows:
    - label: "VAE 12-16m"
      source: synthesis/eval_results/12_16m/eval_results.json
      key_map:
        mcd_mean: mcd_mean
        mcd_std: mcd_std
        speaker_similarity_mean: speaker_similarity_mean
        age_classifier_accuracy: age_classifier_accuracy
        f0_mean: f0_stats.mean
        f0_std: f0_stats.std
      meta: {age_group: "12_16m", model: "VAE"}
    - label: "VITS 34-38m"
      source: synthesis/eval_results/34_38m/eval_results.json
      key_map:
        mcd_mean: mcd_mean
        mcd_std: mcd_std
        speaker_similarity_mean: speaker_similarity_mean
        age_classifier_accuracy: age_classifier_accuracy
        f0_mean: f0_stats.mean
        f0_std: f0_stats.std
      meta: {age_group: "34_38m", model: "VITS"}

# ---------------------------------------------------------------------------
# Table 8: Augmentation Evaluation (BabAR, ratio 1.0)
# ---------------------------------------------------------------------------
- name: table8_augmentation_eval
