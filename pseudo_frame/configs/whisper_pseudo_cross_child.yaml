variant_name: "whisper_pseudo_frame_cross_child"
backbone: "openai/whisper-small"
backbone_layer: -1

# Frame head
hidden_dim: 256
dropout: 0.2

# Train
crop_sec: 10.0
batch_size: 8
num_workers: 2
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 25
patience: 5
seed: 42

# Pseudo-label loss
confidence_weight: true
pos_weight: 3.0

split_dir: "baselines/splits"
device: "cuda"
